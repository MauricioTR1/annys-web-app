<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Papelería Web Annys</title>
  <link rel="stylesheet" type="text/css" href="/css/Estilo_Registro.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" href="/img/AnnysLogo.png" type="image/png" />
</head>

<body>
  <header class="barra-superior">
    <div class="contenido-barra">
      <div class="logo">
        <a href="#">
          <img src="/img/AnnysLogo.png" alt="Logo Annys">
        </a>
      </div>
      <nav class="menu-navegacion">
        <a href="Inicio.html">Inicio</a>
        <div class="dropdown-categorias">
          <a href="#">Categorías</a>
          <ul class="lista-categorias">
            <li>Útiles escolares</li>
            <li>Papelería básica</li>
            <li>Arte y dibujo</li>
            <li>Oficina</li>
          </ul>
        </div>
        <a href="Favoritos.html">Favoritos</a>
        <a href="Carrito.html">Carrito</a>
      </nav>
      <div class="profile-pic">
        <a href="inicioSesion.html"><i class="fa-solid fa-user" style="color: #ffffff;"></i></a>
      </div>
    </div>
  </header>
  <div class="contenedor-registro">
    <h2>Regístrate para comprar</h2>


    <form id="registrar-usuario" action="#Inicio.html" method="POST">
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre de pila</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
      </div>
      <div class="mb-3">
        <label for="apellidos" class="form-label">Apellidos</label>
        <input type="text" class="form-control" id="apellidos" name="apellidos" required>
      </div>
      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" name="correo" required>
      </div>
      <div class="mb-3">
        <label for="contrasena" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" name="contrasena" required>
      </div>
      <button type="submit" id="registrarse-btn" class="btn btn-primary boton-enviar">Registrarse</button>
      <p href="Registro.html">¿Ya tienes Cuenta? <a href="inicioSesion.html">Inicia sesión</a></p>
    </form>


  </div>

  <footer class="pie-pagina">
    <p>&copy; 2025 Papelería Web Annys. Todos los derechos reservados.</p>
  </footer>
  <script>
    const apiUrl = "http://localhost:8080/usuarios";
    const form = document.getElementById("registrar-usuario");
    const submitBtn = document.getElementById("registrarse-btn");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      let nombre_de_usuario = document.getElementById("nombre").value.trim() + " " + document.getElementById("apellidos").value.trim();
      console.log(nombre_de_usuario);
      const usuario = {
        nombre_usuario: nombre_de_usuario,
        correo_usuario: document.getElementById("correo").value.trim(),
        contrasenia_usuario: document.getElementById("contrasena").value.trim(),
      }
      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(usuario)
        });
        if (response.ok) {
          alert("Registro exitoso");
          form.reset();
        } else {
          console.log(JSON.stringify(usuario))
          let errorMessage = response.statusText;
          try {
            const errorData = await response.json();
            errorMessage = errorData.message || errorMessage;
          } catch {

          }
          alert("Error al guardar " + errorMessage)
        }
      } catch (error) {
        console.error("Error en la conexión ", error);
        alert("Error en la conexión al servidor")
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>

</body>

</html>
