<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Papelería Web Annys</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --color-principal: #5eaecb;
      --color-secundario: #4a99b0;
      --color-fondo: #edf6fa;
      --color-texto: #184b63;
    }

    body {
      background-color: var(--color-fondo);
      font-family: 'Segoe UI', sans-serif;
      color: var(--color-texto);
    }

    .contenedor-registro {
      max-width: 500px;
      margin: 60px auto;
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .contenedor-registro h2 {
      text-align: center;
      color: var(--color-principal);
      margin-bottom: 30px;
    }

    .boton-enviar {
      background-color: var(--color-principal);
      border: none;
      width: 100%;
    }

    .boton-enviar:hover {
      background-color: var(--color-secundario);
    }

    .pie-pagina {
      background-color: var(--color-principal);
      color: #ffffff;
      text-align: center;
      padding: 20px 0;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <div class="contenedor-registro">
    <h2>Iniciar Sesión</h2>
    <form action="#" method="POST">
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
      </div>
      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" name="correo" required>
      </div>
      <div class="mb-3">
        <label for="contrasena" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" name="contrasena" required>
      </div>
      <button type="submit" class="btn btn-primary boton-enviar">Iniciar</button>
    </form>
  </div>

  <footer class="pie-pagina">
    <p>&copy; 2025 Papelería Web Annys. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
