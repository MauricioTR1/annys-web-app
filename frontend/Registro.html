<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - Papelería Web Annys</title>
  <link rel="stylesheet" type="text/css" href="/css/Estilo_Registro.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="contenedor-registro">
    <h2>Iniciar Sesión</h2>
    <form action="#" method="POST">
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
      </div>
      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" name="correo" required>
      </div>
      <div class="mb-3">
        <label for="contrasena" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" name="contrasena" required>
      </div>
      <button type="submit" class="btn btn-primary boton-enviar">Iniciar</button>
    </form>
  </div>

  <footer class="pie-pagina">
    <p>&copy; 2025 Papelería Web Annys. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
